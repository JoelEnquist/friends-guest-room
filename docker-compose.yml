version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: friends-guest-room-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: friends_guest_room
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
